name: Publish to GHCR

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        run: |
          GIT_SHA="${{ github.sha }}"
          IMAGE="ghcr.io/${{ github.repository_owner }}/split-pro"

          docker build \
            --progress=plain \
            --build-arg APP_VERSION="${GIT_SHA:0:7}" \
            -t "$IMAGE:latest" \
            -t "$IMAGE:$GIT_SHA" \
            .

          docker push "$IMAGE:latest"
          docker push "$IMAGE:$GIT_SHA"
